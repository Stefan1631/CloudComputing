<!DOCTYPE html>
<html>
<head>
    <title>Istoric Traduceri</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 800px; max-height: 80vh; overflow-y: auto; padding-right: 10px;">
       {% for t in continut %}
        <div class="result" style="margin-bottom: 10px; border-left: 5px solid #34a853;">
            <small>{{ t['timestamp'] }}</small><br>
            <strong>EN:</strong> {{ t['original'] }}<br>
            <strong>RO:</strong> {{ t['tradus'] }}<br>
            {% if t['sentiment_score'] is defined %}
            <small>Sentiment: {{ t['sentiment_score'] }} (magnitudine: {{ t['sentiment_magnitude'] }})</small>
            {% endif %}
        </div>
        {% else %}
        <p>Nu s-a tradus nimic inca</p>
        {% endfor %}

    </div>
</body>
</html>
