<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Secretar - {{ secretar.nume }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #34495e; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px;
            box-sizing: border-box; font-size: 14px; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #3498db; outline: none;
        }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #219a52; }
        .anunt-card {
            border: 1px solid #ddd; border-radius: 8px; padding: 15px;
            margin-bottom: 12px; background: #f9f9f9;
        }
        .anunt-card h4 { margin: 0 0 4px 0; color: #2c3e50; }
        .anunt-meta { font-size: 12px; color: #7f8c8d; margin-bottom: 8px; }
        .anunt-card p { margin: 0; color: #555; }
        .mesaj-ok { color: #27ae60; font-weight: 600; margin-top: 10px; }
        .mesaj-err { color: #e74c3c; font-weight: 600; margin-top: 10px; }
        .form-card { background: #f4f7f6; border-radius: 10px; padding: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Panou Secretar: {{ secretar.nume }}</h1>
        <p>Gestionare conturi și anunțuri.</p>
    </div>

    <div class="tabs">
        <button class="btn active" onclick="schimbaTab('conturi', this)">Creare Conturi</button>
        <button class="btn" onclick="schimbaTab('anunturi', this)">Anunțuri</button>
    </div>

    <!-- TAB: Creare Conturi -->
    <div id="tab-conturi" class="tab-content active">
        <div class="form-card">
            <h3>Creare Cont Nou</h3>
            <div class="form-group">
                <label>Rol</label>
                <select id="rol-select" onchange="actualizeazaFormular()">
                    <option value="elev">Elev</option>
                    <option value="parinte">Părinte</option>
                    <option value="profesor">Profesor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="input-username" placeholder="ex: ion.popescu">
            </div>
            <div class="form-group">
                <label>Parolă</label>
                <input type="password" id="input-password" placeholder="parolă">
            </div>
            <div class="form-group" id="field-nume">
                <label>Nume complet</label>
                <input type="text" id="input-nume" placeholder="ex: Ion Popescu">
            </div>
            <div class="form-group" id="field-materie" style="display:none;">
                <label>Materia predată</label>
                <input type="text" id="input-materie" placeholder="ex: Matematica">
            </div>
            <button class="btn btn-success" onclick="creeazaCont()">Crează Cont</button>
            <p id="mesaj-creare"></p>
        </div>
    </div>

    <!-- TAB: Anunțuri -->
    <div id="tab-anunturi" class="tab-content">
        <div class="form-card">
            <h3>Adaugă Anunț</h3>
            <div class="form-group">
                <label>Titlu</label>
                <input type="text" id="anunt-titlu" placeholder="titlul anunțului">
            </div>
            <div class="form-group">
                <label>Conținut</label>
                <textarea id="anunt-continut" rows="4" placeholder="textul anunțului..."></textarea>
            </div>
            <button class="btn btn-success" onclick="publicaAnunt()">Publică Anunț</button>
            <p id="mesaj-anunt"></p>
        </div>

        <h3>Anunțuri Publicate</h3>
        <div id="lista-anunturi"><p>Se încarcă...</p></div>
    </div>
</div>

<script>
    const SECRETAR_NUME = "{{ secretar.nume }}";

    function schimbaTab(tab, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tabs .btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        btn.classList.add('active');
        if (tab === 'anunturi') incarcaAnunturi();
    }

    function actualizeazaFormular() {
        const rol = document.getElementById('rol-select').value;
        document.getElementById('field-nume').style.display = (rol === 'elev' || rol === 'profesor') ? 'block' : 'none';
        document.getElementById('field-materie').style.display = (rol === 'profesor') ? 'block' : 'none';
    }

    async function creeazaCont() {
        const rol = document.getElementById('rol-select').value;
        const payload = {
            rol,
            username: document.getElementById('input-username').value.trim(),
            password: document.getElementById('input-password').value.trim(),
            nume: document.getElementById('input-nume').value.trim(),
            nume_materie: document.getElementById('input-materie').value.trim(),
        };

        const resp = await fetch('/api/secretar/creeaza-cont', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await resp.json();
        const mesaj = document.getElementById('mesaj-creare');
        if (resp.ok) {
            mesaj.className = 'mesaj-ok';
            mesaj.innerText = `Cont creat cu succes! (ID entitate: ${data.entity_id})`;
            document.getElementById('input-username').value = '';
            document.getElementById('input-password').value = '';
            document.getElementById('input-nume').value = '';
            document.getElementById('input-materie').value = '';
        } else {
            mesaj.className = 'mesaj-err';
            mesaj.innerText = data.detail || 'Eroare la crearea contului.';
        }
    }

    async function incarcaAnunturi() {
        const res = await fetch('/api/anunturi');
        const anunturi = await res.json();
        const container = document.getElementById('lista-anunturi');
        if (anunturi.length === 0) {
            container.innerHTML = '<p>Nu există anunțuri publicate.</p>';
            return;
        }
        container.innerHTML = anunturi.map(a => `
            <div class="anunt-card">
                <h4>${a.titlu}</h4>
                <div class="anunt-meta">${a.data} &middot; ${a.autor}</div>
                <p>${a.continut}</p>
            </div>
        `).join('');
    }

    async function publicaAnunt() {
        const titlu = document.getElementById('anunt-titlu').value.trim();
        const continut = document.getElementById('anunt-continut').value.trim();
        if (!titlu || !continut) {
            document.getElementById('mesaj-anunt').className = 'mesaj-err';
            document.getElementById('mesaj-anunt').innerText = 'Completează titlul și conținutul.';
            return;
        }
        const resp = await fetch('/api/secretar/anunt', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titlu, continut, autor: SECRETAR_NUME })
        });
        if (resp.ok) {
            document.getElementById('anunt-titlu').value = '';
            document.getElementById('anunt-continut').value = '';
            document.getElementById('mesaj-anunt').className = 'mesaj-ok';
            document.getElementById('mesaj-anunt').innerText = 'Anunț publicat!';
            incarcaAnunturi();
        }
    }
</script>
</body>
</html>
